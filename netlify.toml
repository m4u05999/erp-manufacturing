[build]
  command = "npx prisma generate && npx next build --webpack"
  publish = ".next"

# Next.js SPA fallback
[[redirects]]
  from = "/*"
  to = "/:splat"
  status = 200

# Cache headers for static assets
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/favicon.ico"
  [headers.values]
    Cache-Control = "public, max-age=86400"
